# ============================================================================
# eBillio RADIUS — docker-compose.yml
# ============================================================================
# This stack runs ALONGSIDE the eBillio backend stack (Laravel/Octane + its
# own MySQL + Redis). It does NOT start its own MySQL — instead it shares
# the existing `ebillio-mysql` container, which already exposes 3306 on the
# host and already has a `radius` database.
#
# Prerequisite: the backend's `ebillio-mysql` container must be running.
# Verify with:  docker ps --filter name=ebillio-mysql
#
# First-time setup: run `sql/setup-radius-on-shared-mysql.sql` against the
# existing MySQL to create the dedicated `radius` user, apply the hardened
# schema, and wire up privileges. See that file's header for instructions.
#
# Networking: the `freeradius` service uses `network_mode: host` so it:
#   1. Can reach the shared MySQL at 127.0.0.1:3306 directly (the host's
#      own loopback, since ebillio-mysql publishes to 127.0.0.1:3306).
#   2. Binds the RADIUS UDP ports (1812, 1813, 1700, 3799) and the internal
#      Status-Server port (18121) directly on the host, with no port maps.
# ============================================================================

services:
  freeradius:
    build: ./freeradius
    container_name: radius-server
    restart: unless-stopped
    # Host networking:
    #   * lets the container reach 127.0.0.1:3306 (shared MySQL on the host)
    #   * binds 1812/1813/1700/3799/18121 directly on the host (no -p needed)
    #   * host firewall rules apply; you can filter these ports via ufw/iptables
    network_mode: host
    environment:
      RADIUS_SECRET: ${RADIUS_SECRET}
      STATUS_SECRET: ${STATUS_SECRET}
      COA_SECRET: ${COA_SECRET}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # DB_HOST is baked into sql.template as 127.0.0.1 (not templated) so
      # a typo here cannot silently redirect RADIUS to a wrong DB. If you
      # move MySQL off localhost, edit freeradius/sql.template directly.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------------------
  # Prometheus exporter for FreeRADIUS Status-Server metrics.
  #
  # Built locally from bvantagelimited/freeradius_exporter upstream source
  # (pinned to v0.1.9) — upstream does not publish a container image to
  # Docker Hub or ghcr.io. See monitoring/exporter/Dockerfile.
  #
  # Host networking (same as FreeRADIUS) so the exporter can reach
  # Status-Server on 127.0.0.1:18121 directly — no bridge-subnet juggling
  # in status-clients.conf. The exporter binds 127.0.0.1:9812 for scrape.
  # ----------------------------------------------------------------------
  freeradius_exporter:
    build: ./monitoring/exporter
    container_name: radius-freeradius-exporter
    restart: unless-stopped
    network_mode: host
    environment:
      RADIUS_ADDRESS: 127.0.0.1:18121
      RADIUS_SECRET: ${STATUS_SECRET}
      RADIUS_TIMEOUT: "5000"
    depends_on:
      freeradius:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

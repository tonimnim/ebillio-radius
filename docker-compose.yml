services:
  mysql:
    image: mysql:8.0
    container_name: radius-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: radius
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/restrict-privileges.sql:/docker-entrypoint-initdb.d/02-restrict-privileges.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=256M
      --innodb-flush-log-at-trx-commit=2
      --max-connections=100
      --skip-symbolic-links
      --skip-show-database
      --local-infile=0
      --secure-file-priv=/var/lib/mysql-files
      --ssl-cert=/var/lib/mysql/server-cert.pem
      --ssl-key=/var/lib/mysql/server-key.pem
      --ssl-ca=/var/lib/mysql/ca.pem
    # TLS note: MySQL 8 auto-generates self-signed certs in the datadir on
    # first startup. The flags above point at those files so the server
    # advertises TLS on the docker bridge. To enable strict TLS for the
    # `radius` user, first add `tls { tls_required = yes }` to
    # freeradius/sql.template, then uncomment the ALTER USER line in
    # sql/restrict-privileges.sql. We deliberately do NOT set
    # --require_secure_transport=ON here.
    ports:
      # Bound to 127.0.0.1 only — do NOT expose MySQL to the public interface.
      # The previous "3306:3306" binding was a security hole. Internal RADIUS
      # auth is unaffected because the freeradius container reaches MySQL
      # over the docker bridge via the service name ("mysql:3306"). External
      # clients (Railway web app, DB admin tools) must reach MySQL through an
      # SSH tunnel, a VPN, or by running on the same host network namespace.
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  freeradius:
    build: ./freeradius
    container_name: radius-server
    restart: unless-stopped
    environment:
      RADIUS_SECRET: ${RADIUS_SECRET}
      STATUS_SECRET: ${STATUS_SECRET}
      COA_SECRET: ${COA_SECRET}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      # RFC 5176 Change-of-Authorization / Disconnect-Message.
      # 3799 = IANA-assigned (Cisco/Juniper/Huawei/Nokia/...).
      # 1700 = MikroTik RouterOS default CoA port.
      - "3799:3799/udp"
      - "1700:1700/udp"
    depends_on:
      mysql:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------------------
  # MONITORING EXPORTERS — disabled until image issue resolved.
  #
  # KNOWN ISSUE (2026-04-10): the bvantagelimited/freeradius_exporter image
  # referenced by the original config does NOT exist on Docker Hub or

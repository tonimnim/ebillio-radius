volumes:
  mysql_data:

networks:
  default:
    # Pinned to a known subnet so freeradius/clients.conf.template and
    # freeradius/status-clients.conf can rely on a stable CIDR for the
    # `dockernet` / `status_exporter` client blocks. Without this, Docker
    # picks a random 172.x bridge subnet per host and the dockernet client
    # match silently fails (FreeRADIUS rejects packets from unknown clients
    # without logging at default verbosity).
    ipam:
      config:
        - subnet: 172.28.0.0/16

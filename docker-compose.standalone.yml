# ============================================================================
# eBillio RADIUS — docker-compose.standalone.yml
# ============================================================================
# Standalone deployment: includes its own MySQL 8.0 instance.
# Use this when the eBillio backend is hosted elsewhere (e.g. Railway) and
# connects to this MySQL remotely for subscriber provisioning.
#
# Usage:
#   docker compose -f docker-compose.standalone.yml up -d --build
#
# The backend (Railway) connects to this MySQL on port 3306 to manage
# subscribers. FreeRADIUS reads from the same DB locally for fast auth.
# ============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: radius-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: radius
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/restrict-privileges.sql:/docker-entrypoint-initdb.d/02-restrict-privileges.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=256M
      --innodb-flush-log-at-trx-commit=2
      --max-connections=100
      --skip-symbolic-links
      --local-infile=0
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  freeradius:
    build: ./freeradius
    container_name: radius-server
    restart: unless-stopped
    network_mode: host
    environment:
      RADIUS_SECRET: ${RADIUS_SECRET}
      STATUS_SECRET: ${STATUS_SECRET}
      COA_SECRET: ${COA_SECRET}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  freeradius_exporter:
    build: ./monitoring/exporter
    container_name: radius-freeradius-exporter
    restart: unless-stopped
    network_mode: host
    environment:
      RADIUS_ADDRESS: 127.0.0.1:18121
      RADIUS_SECRET: ${STATUS_SECRET}
      RADIUS_TIMEOUT: "5000"
    depends_on:
      freeradius:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  mysql_data:

#
#  security.conf -- eBillio FreeRADIUS security hardening
#
#  This file is inlined into /etc/freeradius/radiusd.conf at image build
#  time (see freeradius/Dockerfile), replacing the upstream security{}
#  block that ships with FreeRADIUS 3.2.7.
#
#  It MUST live at the top-level (global) scope of radiusd.conf because
#  the directives below are only valid in the global security{} section
#  -- they cannot be placed inside a server{} or listen{} block.
#
#  Hardening rationale:
#    * CVE-2024-3596 "Blast-RADIUS" -- a MITM attacker who can observe and
#      modify traffic between a RADIUS client (NAS) and server can forge
#      Access-Accept responses when Message-Authenticator is not required.
#      Mitigation: require_message_authenticator = yes, limit_proxy_state = yes.
#      Ref: https://www.blastradius.fail/  https://nvd.nist.gov/vuln/detail/CVE-2024-3596
#    * DoS hardening -- cap attribute count and delay rejects to slow
#      brute-force and malformed-packet attacks.
#

security {
	#  Run as the unprivileged freerad user/group (upstream default).
	user  = freerad
	group = freerad

	#  Never dump core in production -- cores can leak shared secrets
	#  and user credentials from memory.
	allow_core_dumps = no

	#  DoS hardening: cap the number of attributes per RADIUS packet.
	#  Malformed or malicious packets with huge attribute counts can
	#  exhaust CPU/memory. 200 is the FreeRADIUS-recommended ceiling
	#  and is large enough for all legitimate ISP use cases (PPPoE,
	#  hotspot, EAP, accounting interim-updates).
	max_attributes = 200

	#  Brute-force throttle: delay Access-Reject responses by 1 second.
	#  Slows down password guessing against the RADIUS auth port
	#  without impacting legitimate users (who get Access-Accept
	#  with no delay). Useful range per upstream docs: 1..5.
	reject_delay = 1

	#  RFC 5997: respond to Status-Server probes. The actual
	#  status virtual server / listener is defined elsewhere; this
	#  flag is the global on-switch that permits it to function.
	#  Required for NAS dead-detection and external monitoring.
	status_server = yes

	#
	#  CVE-2024-3596 (Blast-RADIUS) mitigation #1:
	#  Require Message-Authenticator on ALL Access-* packets over
	#  UDP/TCP. This is the single most important flag for closing
	#  the Blast-RADIUS MITM vector. Any client (NAS) that is too
	#  old to send Message-Authenticator in Access-Request must be
	#  upgraded before being onboarded to this server. A per-client
	#  override in clients.conf can relax this for a specific NAS
	#  if truly necessary, but the global default stays strict.
	#
	#  Upstream ships this as "auto" (learn from first packet) --
	#  we pin it to "yes" because "auto" state is lost on restart
	#  and does not provide permanent protection.
	#
	require_message_authenticator = yes

	#
	#  CVE-2024-3596 (Blast-RADIUS) mitigation #2:
	#  Reject Access-Request packets that contain Proxy-State
	#  without Message-Authenticator. This is a defence-in-depth
	#  backstop for the (rare) case where require_message_authenticator
	#  is relaxed per-client. With require_message_authenticator = yes
	#  above this is technically ignored, but we set it explicitly so
	#  that any future per-client relaxation still gets protection.
	#
	limit_proxy_state = yes
}

#
#  eBillio FreeRADIUS - CoA client list (inbound, RFC 5176)
#  --------------------------------------------------------
#
#  ONLY systems listed here are allowed to send CoA-Request or
#  Disconnect-Request packets into our FreeRADIUS instance. The
#  shared secret is ${COA_SECRET}, which MUST NOT match the main
#  ${RADIUS_SECRET} used by NASes for auth/acct.
#
#  This file is rendered from coa-clients.conf (as a template) by
#  docker-entrypoint.sh via envsubst. The rendered copy lives at
#  /etc/freeradius/coa-clients.conf and is pulled in via
#  `$INCLUDE coa-clients.conf` from sites-enabled/coa.
#
#  The named `clients coa_clients { ... }` block is referenced from
#  the coa site's listen blocks with `clients = coa_clients`, so
#  only these clients - and not the main clients.conf entries - can
#  deliver packets to the CoA listeners.
#

clients coa_clients {

	#
	#  Loopback: radclient running on the same host (useful for
	#  smoke tests from the radius-server container itself).
	#
	client coa_localhost {
		ipaddr = 127.0.0.1
		secret = ${COA_SECRET}
		require_message_authenticator = yes
		shortname = coa-local
		nastype = other
	}

	#
	#  Docker bridge / compose network. The compose network is pinned
	#  to 172.28.0.0/16 in docker-compose.yml (see networks.default.ipam).
	#  If you change that, update this CIDR to match.
	#
	client coa_dockernet {
		ipaddr = 172.28.0.0/16
		secret = ${COA_SECRET}
		require_message_authenticator = yes
		shortname = coa-docker
		nastype = other
	}

	#
	#  --- Production billing app (uncomment + edit) -----------
	#
	#  client billing_app_prod {
	#      ipaddr = 10.10.20.5
	#      secret = ${COA_SECRET}
	#      require_message_authenticator = yes
	#      shortname = billing-prod
	#      nastype = other
	#  }
	#
	#  client billing_app_staging {
	#      ipaddr = 10.10.30.5
	#      secret = ${COA_SECRET}
	#      require_message_authenticator = yes
	#      shortname = billing-staging
	#      nastype = other
	#  }
	#
	#  --- Back-office NOC box (optional) ----------------------
	#
	#  client noc_workstation {
	#      ipaddr = 10.10.99.0/24
	#      secret = ${COA_SECRET}
	#      require_message_authenticator = yes
	#      shortname = noc
	#      nastype = other
	#  }
}

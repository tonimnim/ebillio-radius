######################################################################
#
#  eBillio FreeRADIUS - Status-Server client ACL
#
#  This file defines the ONLY clients permitted to query the
#  Status-Server virtual server (see sites-enabled/status).
#
#  The "clients status_clients" wrapper names the list so that the
#  status listener can reference it via `clients = status_clients`.
#  Any client not listed here is rejected at the Status-Server port.
#
#  IMPORTANT - adjust status_exporter ipaddr to match YOUR docker
#  bridge subnet. The default compose network typically uses
#  172.18.0.0/16 or 172.19.0.0/16, NOT docker0's 172.17.0.0/16.
#  Verify with:
#
#      docker network inspect ebillio-radius_default \
#          | grep -i subnet
#
#  Then update the ipaddr below accordingly (or tighten it to the
#  specific IP of the prometheus exporter container).
#
#  STATUS_SECRET is substituted at container start by
#  docker-entrypoint.sh via envsubst.
#
######################################################################

clients status_clients {
	client status_localhost {
		ipaddr = 127.0.0.1
		secret = ${STATUS_SECRET}
		shortname = status_local
		require_message_authenticator = yes
	}

	#  Prometheus exporter running on the docker bridge network.
	#  The compose network is pinned to 172.28.0.0/16 in docker-compose.yml
	#  (see networks.default.ipam.config.subnet). Update both together.
	client status_exporter {
		ipaddr = 172.28.0.0/16
		secret = ${STATUS_SECRET}
		shortname = status_exporter
		require_message_authenticator = yes
	}
}
